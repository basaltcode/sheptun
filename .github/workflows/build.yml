name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            electron_cmd: npx electron-builder --mac --arm64 --publish never
          - os: macos-14
            arch: x64
            electron_cmd: npx electron-builder --mac --x64 --publish never
          - os: windows-latest
            arch: x64
            electron_cmd: npx electron-builder --win --publish never
          - os: ubuntu-latest
            arch: x64
            electron_cmd: npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python dependencies
        run: |
          pip install setuptools wheel
          pip install pyinstaller
          pip install -r backend/requirements-build.txt

      - name: Build backend with PyInstaller
        run: python backend/build.py

      - name: Verify backend binary
        run: ls -la backend/dist/sheptun-backend/
        shell: bash

      - name: Install Node dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Build Electron
        run: ${{ matrix.electron_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          generate_release_notes: true
