name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            electron_cmd: npx electron-builder --mac --arm64 --publish always
            python_url: https://github.com/indygreg/python-build-standalone/releases/download/20260408/cpython-3.11.15+20260408-aarch64-apple-darwin-install_only.tar.gz
          - os: macos-14
            arch: x64
            electron_cmd: npx electron-builder --mac --x64 --publish always
            python_url: https://github.com/indygreg/python-build-standalone/releases/download/20260408/cpython-3.11.15+20260408-x86_64-apple-darwin-install_only.tar.gz
          - os: windows-latest
            arch: x64
            electron_cmd: npx electron-builder --win --publish always
            python_url: https://github.com/indygreg/python-build-standalone/releases/download/20260408/cpython-3.11.15+20260408-x86_64-pc-windows-msvc-install_only.tar.gz
          - os: ubuntu-latest
            arch: x64
            electron_cmd: npx electron-builder --linux --publish always
            python_url: https://github.com/indygreg/python-build-standalone/releases/download/20260408/cpython-3.11.15+20260408-x86_64-unknown-linux-gnu-install_only.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python dependencies
        run: |
          pip install setuptools wheel
          pip install pyinstaller
          pip install -r backend/requirements-build.txt

      - name: Build backend with PyInstaller
        run: python backend/build.py

      - name: Verify backend binary
        run: ls -la backend/dist/sheptun-backend/
        shell: bash

      - name: Download standalone Python for bundling
        shell: bash
        run: |
          mkdir -p backend/dist
          curl -L -o python-standalone.tar.gz "${{ matrix.python_url }}"
          tar xzf python-standalone.tar.gz -C backend/dist/
          rm python-standalone.tar.gz
          ls -la backend/dist/python/
          # Verify it works
          if [ "${{ runner.os }}" = "Windows" ]; then
            backend/dist/python/python.exe --version
          else
            backend/dist/python/bin/python3 --version
          fi

      - name: Install Node dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Build Electron
        run: ${{ matrix.electron_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          generate_release_notes: true
