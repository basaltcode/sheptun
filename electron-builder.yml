appId: com.whisper.transcription
productName: Whisper Transcription
copyright: Copyright 2024

directories:
  output: release

files:
  - electron/**/*
  - frontend/dist/**/*
  - package.json

extraResources:
  - from: backend/
    to: backend/
    filter:
      - "**/*.py"
      - "requirements.txt"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: AudioVideo

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
