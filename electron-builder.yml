appId: com.basaltcode.sheptun
productName: Sheptun
copyright: Copyright 2024 Basalt Code

publish:
  provider: github
  owner: basaltcode
  repo: sheptun

directories:
  output: release

files:
  - electron/**/*
  - frontend/dist/**/*
  - package.json

extraResources:
  - from: backend/dist/sheptun-backend/
    to: backend/
    filter:
      - "**/*"
  - from: backend/dist/python/
    to: python/
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: AudioVideo

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
